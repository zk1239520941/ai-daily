name: AI Daily 早报

permissions:
  contents: write
  pages: write
  id-token: write

on:
  schedule:
    # UTC 00:05 ≈ 北京 08:05
    - cron: "5 0 * * *"
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: "跳过补抓，直接生成 digest"
        required: false
        default: false
        type: boolean
      force:
        description: "强制重新生成（忽略今日已有 digest/skip）"
        required: false
        default: false
        type: boolean
      wecom_only:
        description: "仅重发企微（跳过 fetch/push/publish，Pages 已就绪时用）"
        required: false
        default: false
        type: boolean

concurrency:
  group: ai-daily-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - run: cp config.user.json config.json

      - name: 仅重发 digest 企微
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.wecom_only == true }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SKIP_PAGES_WORKFLOW_WAIT: "true"
          WECOM_URL_WAIT: "60"
        run: uv run python -m src.main wecom

      - name: 提交企微推送记录
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.wecom_only == true }}
        run: uv run python -m src.main commit-fetch

      - name: 同步远端 news-data（git 为唯一真源）
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.wecom_only != true }}
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: 推送前补抓
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.skip_fetch != true) && (github.event_name != 'workflow_dispatch' || inputs.wecom_only != true) }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: uv run python -m src.main fetch

      - name: 生成日报（不推 digest 企微）
        id: push
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.wecom_only != true }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          set +e
          uv run python -m src.main push --defer-wecom $ARGS
          EXIT=$?
          set -e
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            exit "$EXIT"
          fi
          STATUS=$(python -c "import json; print(json.load(open('news-data/.last-push-result.json')).get('status','unknown'))")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "push_status=$STATUS"

      - name: 今日 digest 已存在（幂等，不重复推企微）
        if: steps.push.outputs.status == 'idempotent'
        run: echo "ℹ️ 今日 digest 已存在，跳过 publish / Pages / 企微"

      - name: 提交 push 日报到 git
        if: steps.push.outputs.status == 'generated'
        env:
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
        run: uv run python -m src.main publish

      - name: 准备 Pages 站点
        if: steps.push.outputs.status == 'generated'
        run: |
          uv run python scripts/build_pages_index.py
          mkdir -p _site
          cp index.html _site/
          cp search.html _site/ 2>/dev/null || true
          cp -r news-data _site/
          if [ -d archive ]; then cp -r archive _site/; fi
          if [ -d static ]; then cp -r static _site/; fi

      - name: 配置 Pages
        if: steps.push.outputs.status == 'generated'
        uses: actions/configure-pages@v5

      - name: 上传 Pages artifact
        if: steps.push.outputs.status == 'generated'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署 GitHub Pages
        if: steps.push.outputs.status == 'generated'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: URL 可访问后推送 digest 企微
        if: steps.push.outputs.status == 'generated'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SKIP_PAGES_WORKFLOW_WAIT: "true"
          WECOM_URL_WAIT: "180"
        run: uv run python -m src.main wecom

      - name: 提交 run-state（含企微推送记录）
        if: steps.push.outputs.status == 'generated'
        run: uv run python -m src.main commit-fetch

      - name: 提交 skip 状态到 git
        if: steps.push.outputs.status == 'skipped'
        run: uv run python -m src.main commit-fetch

      - name: 上传 push 结果 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: push-result
          path: |
            news-data/.last-push-result.json
            news-data/run-state.json
            news-data/push-skip-*.json
          if-no-files-found: ignore

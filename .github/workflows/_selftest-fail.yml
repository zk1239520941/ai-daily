# 临时自检 workflow：用于验证 Cursor Automation「失败自动修」能否被 main 上的失败触发。
# 仅手动触发（workflow_dispatch），合并到 main 不会自动运行；需手动 dispatch 才会故意失败。
# 验证完成后删除本文件。
name: _selftest-fail

on:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 故意失败以触发自动修复自测
        run: |
          echo "Cursor Automation 自检：此步故意以退出码 1 失败"
          exit 1

name: AI Daily 抓取

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: ai-daily-fetch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 同步远端 news-data（git 为唯一真源）
        run: git pull --rebase origin ${{ github.ref_name }} || true

      # 不再 cache 覆盖 news-data：git 才是真源；cache 曾把冲突标记文件盖回工作区

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - run: cp config.user.json config.json

      - name: 抓取 RSS 并评分（含即时热点）
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: uv run python -m src.main fetch

      - name: 提交 fetch 数据
        run: uv run python -m src.main commit-fetch

      - name: 再次同步远端（避免与 daily 并发冲突）
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: 检查是否需要补发早报
        id: ensure
        run: |
          set +e
          uv run python -m src.main ensure-digest
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "ensure_digest_code=$CODE"
          if [ "$CODE" -eq 2 ] || [ "$CODE" -eq 3 ]; then
            exit 0
          fi
          exit "$CODE"

      - name: 持久化补发标记
        if: steps.ensure.outputs.code == '2' || steps.ensure.outputs.code == '3'
        run: uv run python -m src.main commit-fetch

      - name: 补触发早报 workflow（生成 digest）
        if: steps.ensure.outputs.code == '2'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "daily.yml",
              ref: context.ref,
              inputs: {
                skip_fetch: true,
                force: false,
                wecom_only: false,
              },
            });
            core.notice("今日 digest 缺失，已补触发 AI Daily 早报 workflow");

      - name: 补触发 digest 企微（push 已存在）
        if: steps.ensure.outputs.code == '3'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "daily.yml",
              ref: context.ref,
              inputs: {
                skip_fetch: true,
                force: false,
                wecom_only: true,
              },
            });
            core.notice("今日 digest 已生成但未推企微，已补触发 wecom_only");
